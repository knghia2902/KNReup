<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Template</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300..800&display=swap');

        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            position: relative;
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            box-sizing: border-box;
            word-break: break-word;
            text-wrap: balance;
        }

        /* Template: hook */
        .hook-headline {
            font-family: 'Playfair Display', serif;
            font-size: 130px;
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            color: #0f172a;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(50px);
        }

        .hook-subhead {
            font-family: 'Inter', sans-serif;
            font-size: 50px;
            font-weight: 300;
            letter-spacing: -1px;
            text-align: center;
            color: #64748b;
            opacity: 0;
        }

        /* Template: stat-hero */
        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 240px;
            font-weight: 900;
            color: #0f172a;
            text-align: center;
            letter-spacing: -5px;
            opacity: 0;
            transform: scale(0.5);
        }

        .stat-label {
            font-family: 'Inter', sans-serif;
            font-size: 60px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #475569;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
        }

        /* Template: feature-list */
        .feature-title {
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            font-weight: 700;
            margin-bottom: 80px;
            align-self: flex-start;
            color: #0f172a;
            opacity: 0;
        }

        .feature-item {
            font-size: 60px;
            font-weight: 400;
            margin-bottom: 50px;
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 40px;
            color: #334155;
            opacity: 0;
            transform: translateX(-50px);
        }

        .feature-item::before {
            content: "-";
            color: #94a3b8;
            font-weight: 300;
        }

        /* Template: callout */
        .callout-tag {
            border: 2px solid #0f172a;
            color: #0f172a;
            padding: 15px 50px;
            border-radius: 100px;
            font-size: 45px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
        }

        .callout-text {
            font-family: 'Playfair Display', serif;
            font-size: 85px;
            font-weight: 500;
            font-style: italic;
            text-align: center;
            line-height: 1.4;
            color: #0f172a;
            opacity: 0;
        }

        /* Template: comparison */
        .comparison-container {
            display: flex;
            width: 100%;
            height: 600px;
            gap: 2px;
            opacity: 0;
        }

        .comparison-side {
            flex: 1;
            background: #ffffff;
            padding: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 60px;
            font-weight: 400;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .comparison-side.left { border-radius: 40px 0 0 40px; border-right: 1px solid #e2e8f0; }
        .comparison-side.right { border-radius: 0 40px 40px 0; }

        /* Template: outro */
        .outro-cta {
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            font-weight: 700;
            margin-bottom: 60px;
            color: #0f172a;
            opacity: 0;
        }

        .outro-source {
            font-size: 50px;
            color: #64748b;
            opacity: 0;
        }

        /* Base backgrounds */
        #bg-image {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.05;
            filter: grayscale(100%);
        }

        #bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(248,250,252,0.8) 0%, rgba(241,245,249,0.95) 100%);
            z-index: -1;
        }

        /* Template: quote */
        .quote-mark { font-family: 'Anton', sans-serif; font-size: 150px; color: #a855f7; position: absolute; top: 100px; left: 100px; opacity: 0; }
        .quote-text { font-family: 'Lora', serif; font-size: 80px; font-style: italic; text-align: center; margin-bottom: 60px; line-height: 1.4; opacity: 0; transform: translateY(40px); }
        .quote-author { font-size: 50px; font-weight: bold; color: #fbbf24; text-align: right; width: 100%; opacity: 0; }

        /* Template: timeline */
        .tl-title { font-family: 'Anton', sans-serif; font-size: 90px; color: #fff; margin-bottom: 80px; align-self: flex-start; opacity: 0; }
        .tl-row { display: flex; align-items: center; gap: 40px; margin-bottom: 40px; width: 100%; opacity: 0; transform: translateX(-50px); }
        .tl-dot { width: 30px; height: 30px; border-radius: 50%; background: #38bdf8; flex-shrink: 0; }
        .tl-year { font-family: 'Anton', sans-serif; font-size: 70px; color: #38bdf8; width: 250px; flex-shrink: 0; }
        .tl-event { font-size: 55px; font-weight: 600; color: #f0f4ff; }
        .tl-line { width: 4px; height: 40px; background: #38bdf8; margin-left: 13px; margin-bottom: 10px; margin-top: -30px; align-self: flex-start; }

        /* Template: countdown */
        .cd-label { font-size: 60px; font-weight: bold; color: #94a3b8; margin-bottom: -20px; opacity: 0; }
        .cd-number { font-family: 'Anton', sans-serif; font-size: 350px; color: #f43f5e; line-height: 1; opacity: 0; transform: scale(0.5); }
        .cd-unit { font-size: 80px; font-weight: 800; color: #fff; margin-top: -20px; opacity: 0; }

        /* Template: split-image */
        .split-wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .split-img { width: 100%; height: 50%; background: linear-gradient(135deg, #10b98144, #05966922); display: flex; align-items: center; justify-content: center; font-size: 150px; opacity: 0; transform: translateY(-40px); }
        .split-text-zone { width: 100%; height: 50%; padding: 80px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; background: #111827; }
        .split-headline { font-family: 'Anton', sans-serif; font-size: 100px; color: #fff; margin-bottom: 40px; line-height: 1.1; opacity: 0; transform: translateY(40px); }
        .split-body { font-size: 60px; color: #94a3b8; line-height: 1.4; opacity: 0; }

        /* Template: data-grid */
        .dg-title { font-family: 'Anton', sans-serif; font-size: 90px; color: #fff; margin-bottom: 80px; opacity: 0; }
        .dg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .dg-cell { background: rgba(255,255,255,0.05); border: 4px solid #3b82f633; border-radius: 40px; padding: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: scale(0.8); }
        .dg-cell-value { font-family: 'Anton', sans-serif; font-size: 120px; color: #3b82f6; margin-bottom: 20px; }
        .dg-cell-label { font-size: 45px; font-weight: 600; color: #94a3b8; text-align: center; }

        /* Template: title-card */
        .tc-category { font-size: 50px; font-weight: bold; color: #f59e0b; letter-spacing: 5px; margin-bottom: 40px; opacity: 0; }
        .tc-title { font-family: 'Anton', sans-serif; font-size: 140px; line-height: 1.1; text-transform: uppercase; color: #fff; text-align: center; margin-bottom: 60px; opacity: 0; transform: translateY(40px); }
        .tc-divider { width: 100%; height: 8px; background: #f59e0b; margin-bottom: 60px; opacity: 0; transform: scaleX(0); }
        .tc-date { font-size: 45px; font-weight: bold; color: #94a3b8; opacity: 0; }

    </style>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<div id="container"></div>

<script>
    // Hàm này sẽ được Playwright gọi để render scene
    window.renderScene = function(sceneData) {
        // Reset GSAP to avoid timeline accumulation across scenes
        gsap.globalTimeline.clear();
        gsap.globalTimeline.time(0);
        
        const container = document.getElementById('container');
        container.innerHTML = ''; // Clear old content
        
        const tpl = sceneData.templateData;
        const timeline = gsap.timeline();
        const templateName = (tpl.template || '').toLowerCase();

        if (templateName === 'hook') {
            const h1 = document.createElement('div');
            h1.className = 'hook-headline';
            h1.textContent = tpl.headline;
            container.appendChild(h1);

            timeline.to(h1, {opacity: 1, y: 0, duration: 0.8, ease: "power4.out"});

            if (tpl.subhead) {
                const sub = document.createElement('div');
                sub.className = 'hook-subhead';
                sub.textContent = tpl.subhead;
                container.appendChild(sub);
                timeline.to(sub, {opacity: 1, duration: 0.8}, "-=0.4");
            }

        } else if (templateName === 'stat-hero') {
            const val = document.createElement('div');
            val.className = 'stat-value';
            val.textContent = tpl.value;
            
            const lbl = document.createElement('div');
            lbl.className = 'stat-label';
            lbl.textContent = tpl.label;

            container.appendChild(val);
            container.appendChild(lbl);

            timeline.to(val, {opacity: 1, scale: 1, duration: 1, ease: "elastic.out(1, 0.5)"});
            timeline.to(lbl, {opacity: 1, duration: 0.5}, "-=0.5");

        } else if (templateName === 'feature-list') {
            const title = document.createElement('div');
            title.className = 'feature-title';
            title.textContent = tpl.title;
            container.appendChild(title);
            timeline.to(title, {opacity: 1, duration: 0.6});

            if (tpl.bullets && tpl.bullets.length > 0) {
                tpl.bullets.forEach((b, i) => {
                    const item = document.createElement('div');
                    item.className = 'feature-item';
                    item.textContent = b;
                    container.appendChild(item);
                    timeline.to(item, {opacity: 1, x: 0, duration: 0.5}, "-=0.3");
                });
            }

        } else if (templateName === 'comparison') {
            const wrapper = document.createElement('div');
            wrapper.className = 'comparison-wrapper';

            const left = document.createElement('div');
            left.className = `comparison-side ${tpl.left.color}`;
            left.innerHTML = `<div class="comp-label">${tpl.left.label}</div><div class="comp-value">${tpl.left.value}</div>`;
            
            const right = document.createElement('div');
            right.className = `comparison-side ${tpl.right.color}`;
            right.innerHTML = `<div class="comp-label">${tpl.right.label}</div><div class="comp-value">${tpl.right.value}</div>`;

            wrapper.appendChild(left);
            wrapper.appendChild(right);
            container.appendChild(wrapper);

            timeline.to(wrapper, {opacity: 1, duration: 0.5});
            timeline.from(left, {y: 100, opacity: 0, duration: 0.8, ease: "back.out(1.7)"}, "-=0.2");
            timeline.from(right, {y: 100, opacity: 0, duration: 0.8, ease: "back.out(1.7)"}, "-=0.6");

        } else if (templateName === 'callout') {
            const box = document.createElement('div');
            box.className = 'callout-box';

            if (tpl.tag) {
                const tag = document.createElement('div');
                tag.className = 'callout-tag';
                tag.textContent = tpl.tag;
                box.appendChild(tag);
            }

            const state = document.createElement('div');
            state.className = 'callout-statement';
            state.textContent = tpl.statement;
            box.appendChild(state);

            container.appendChild(box);

            timeline.to(box, {opacity: 1, y: 0, duration: 1, ease: "power4.out"});

        } else if (templateName === 'outro') {
            const cta = document.createElement('div');
            cta.className = 'outro-cta';
            cta.textContent = tpl.ctaTop;

            const chan = document.createElement('div');
            chan.className = 'outro-channel';
            chan.textContent = tpl.channelName;

            container.appendChild(cta);
            container.appendChild(chan);

            timeline.to(cta, {opacity: 1, duration: 0.6});
            timeline.to(chan, {opacity: 1, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.5)"}, "-=0.2");
        }
        } else if (templateName === 'quote') {
            const mark = document.createElement('div'); mark.className = 'quote-mark'; mark.textContent = '"';
            const txt = document.createElement('div'); txt.className = 'quote-text'; txt.textContent = tpl.text;
            const auth = document.createElement('div'); auth.className = 'quote-author'; auth.textContent = tpl.author;
            container.appendChild(mark); container.appendChild(txt); container.appendChild(auth);
            timeline.to(mark, {opacity: 0.2, duration: 0.4});
            timeline.to(txt, {opacity: 1, y: 0, duration: 0.8, ease: 'power3.out'}, '-=0.2');
            timeline.to(auth, {opacity: 1, duration: 0.5}, '-=0.3');

        } else if (templateName === 'timeline') {
            const title = document.createElement('div'); title.className = 'tl-title'; title.textContent = tpl.title;
            container.appendChild(title); container.style.alignItems = 'flex-start';
            if (tpl.events) {
                tpl.events.forEach((ev, i) => {
                    if (i > 0) { const line = document.createElement('div'); line.className = 'tl-line'; container.appendChild(line); }
                    const row = document.createElement('div'); row.className = 'tl-row';
                    row.innerHTML = `<div class="tl-dot"></div><div class="tl-year">${ev.year}</div><div class="tl-event">${ev.event}</div>`;
                    container.appendChild(row);
                    timeline.to(row, {opacity: 1, x: 0, duration: 0.4}, `-=${i ? 0.2 : 0}`);
                });
            }
            timeline.to(title, {opacity: 1, duration: 0.5}, 0);

        } else if (templateName === 'countdown') {
            const lbl = document.createElement('div'); lbl.className = 'cd-label'; lbl.textContent = tpl.label;
            const num = document.createElement('div'); num.className = 'cd-number'; num.textContent = tpl.number;
            const unit = document.createElement('div'); unit.className = 'cd-unit'; unit.textContent = tpl.unit;
            container.appendChild(lbl); container.appendChild(num); container.appendChild(unit);
            timeline.to(lbl, {opacity: 1, duration: 0.3});
            timeline.to(num, {opacity: 1, scale: 1, duration: 1.2, ease: 'elastic.out(1,0.4)'}, '-=0.1');
            timeline.to(unit, {opacity: 1, duration: 0.4}, '-=0.5');

        } else if (templateName === 'split-image') {
            container.style.padding = '0'; container.style.gap = '0';
            const wrap = document.createElement('div'); wrap.className = 'split-wrap';
            const img = document.createElement('div'); img.className = 'split-img'; img.textContent = '🖼️';
            const textZone = document.createElement('div'); textZone.className = 'split-text-zone';
            textZone.innerHTML = `<div class="split-headline">${tpl.headline}</div><div class="split-body">${tpl.body}</div>`;
            wrap.appendChild(img); wrap.appendChild(textZone); container.appendChild(wrap);
            timeline.from(img, {y: -40, opacity: 0, duration: 0.7, ease: 'power3.out'});
            timeline.to(textZone.querySelector('.split-headline'), {opacity: 1, y: 0, duration: 0.6}, '-=0.3');
            timeline.to(textZone.querySelector('.split-body'), {opacity: 1, duration: 0.5}, '-=0.2');

        } else if (templateName === 'data-grid') {
            const title = document.createElement('div'); title.className = 'dg-title'; title.textContent = tpl.title;
            const grid = document.createElement('div'); grid.className = 'dg-grid';
            if (tpl.cells) {
                tpl.cells.forEach(c => {
                    const cell = document.createElement('div'); cell.className = 'dg-cell';
                    cell.innerHTML = `<div class="dg-cell-value">${c.value}</div><div class="dg-cell-label">${c.label}</div>`;
                    grid.appendChild(cell);
                });
            }
            container.appendChild(title); container.appendChild(grid);
            timeline.to(title, {opacity: 1, duration: 0.4});
            grid.querySelectorAll('.dg-cell').forEach((c, i) => {
                timeline.to(c, {opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.5)'}, `-=${i ? 0.3 : 0}`);
            });

        } else if (templateName === 'title-card') {
            const cat = document.createElement('div'); cat.className = 'tc-category'; cat.textContent = tpl.category;
            const title = document.createElement('div'); title.className = 'tc-title'; title.textContent = tpl.title;
            const divider = document.createElement('div'); divider.className = 'tc-divider';
            const date = document.createElement('div'); date.className = 'tc-date'; date.textContent = tpl.date;
            container.appendChild(cat); container.appendChild(title); container.appendChild(divider); container.appendChild(date);
            timeline.to(cat, {opacity: 1, duration: 0.4});
            timeline.to(title, {opacity: 1, y: 0, duration: 0.9, ease: 'power4.out'}, '-=0.2');
            timeline.to(divider, {opacity: 1, scaleX: 1, duration: 0.5, ease: 'power2.out'}, '-=0.4');
            timeline.to(date, {opacity: 1, duration: 0.4}, '-=0.2');


        // Auto-fit text logic to prevent overflow bounds
        // Container max inner dimensions (1080x1920 minus padding and safe areas)
        const MAX_H = 1500;
        const MAX_W = 920;
        let attempts = 0;
        
        while ((container.scrollHeight > MAX_H || container.scrollWidth > MAX_W) && attempts < 25) {
            const elements = container.querySelectorAll('*');
            let shrunk = false;
            elements.forEach(el => {
                const style = window.getComputedStyle(el);
                const size = parseFloat(style.fontSize);
                if (size > 30) { // Don't shrink below 30px to maintain readability
                    el.style.fontSize = (size * 0.9) + 'px';
                    shrunk = true;
                }
            });
            if (!shrunk) break; // Cannot shrink further
            attempts++;
        }

        // Đảm bảo timeline đã sẵn sàng
        gsap.globalTimeline.pause();
        return true;
    };
</script>

</body>
</html>
